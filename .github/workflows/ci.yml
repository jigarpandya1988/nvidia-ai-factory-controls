# =============================================================================
# CI/CD Pipeline — NVIDIA AI Factory Controls
# =============================================================================
# Validates CODESYS structured text syntax, runs Python tests,
# builds Docker images, and validates Terraform.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  DOCKER_REGISTRY: ghcr.io

jobs:
  # ===========================================================================
  # Job 1: Validate CODESYS Structured Text (syntax check)
  # ===========================================================================
  validate-st:
    name: Validate Structured Text
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check ST file syntax (basic validation)
        run: |
          echo "Checking for common ST syntax issues..."
          # Verify all .fb files have FUNCTION_BLOCK declaration
          find libraries/ projects/ -name "*.fb" -exec grep -L "FUNCTION_BLOCK" {} \; | tee /tmp/missing_fb.txt
          if [ -s /tmp/missing_fb.txt ]; then
            echo "ERROR: Files missing FUNCTION_BLOCK declaration:"
            cat /tmp/missing_fb.txt
            exit 1
          fi
          # Verify all .method files have METHOD declaration
          find libraries/ projects/ -name "*.method" -exec grep -L "METHOD" {} \; | tee /tmp/missing_method.txt
          if [ -s /tmp/missing_method.txt ]; then
            echo "ERROR: Files missing METHOD declaration:"
            cat /tmp/missing_method.txt
            exit 1
          fi
          # Check for balanced IF/END_IF
          echo "Basic syntax validation passed."

      - name: Count CODESYS artifacts
        run: |
          echo "=== Project Statistics ==="
          echo "Function Blocks: $(find libraries/ projects/ -name '*.fb' | wc -l)"
          echo "Methods:         $(find libraries/ projects/ -name '*.method' | wc -l)"
          echo "Properties:      $(find libraries/ projects/ -name '*.prop' | wc -l)"
          echo "Enumerations:    $(find libraries/ projects/ -name '*.enum' | wc -l)"
          echo "Structures:      $(find libraries/ projects/ -name '*.struct' | wc -l)"
          echo "Interfaces:      $(find libraries/ projects/ -name '*.interface' | wc -l)"
          echo "GVLs:            $(find libraries/ projects/ -name '*.gvl' | wc -l)"
          echo "Programs:        $(find libraries/ projects/ -name '*.pou' | wc -l)"
          echo "=========================="

  # ===========================================================================
  # Job 2: Python Edge Gateway Tests
  # ===========================================================================
  test-python:
    name: Test Edge Gateway (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r src/edge-gateway/nats-bridge/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run Python linting
        run: |
          pip install ruff
          ruff check src/edge-gateway/nats-bridge/

      - name: Run unit tests
        run: |
          pip install -r tests/python/requirements-test.txt
          pytest tests/python/ -v --tb=short --cov=src/edge-gateway --cov-report=term-missing

  # ===========================================================================
  # Job 3: Build Docker Images
  # ===========================================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v4

      - name: Build NATS Bridge
        run: docker build -t aifactory-nats-bridge src/edge-gateway/nats-bridge/

      - name: Verify Docker Compose
        run: docker compose -f src/edge-gateway/nats-bridge/docker-compose.yml config

  # ===========================================================================
  # Job 4: Validate AWS CDK
  # ===========================================================================
  validate-cdk:
    name: Validate CDK (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CDK Dependencies
        working-directory: deploy/aws-cdk
        run: npm ci

      - name: TypeScript Compile
        working-directory: deploy/aws-cdk
        run: npx tsc --noEmit

      - name: Run CDK Unit Tests
        working-directory: deploy/aws-cdk
        run: npx jest --no-cache

      - name: CDK Synth (validate templates)
        working-directory: deploy/aws-cdk
        run: npx cdk synth --context siteId=test-01 2>&1 | head -50
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: 'us-west-2'

  # ===========================================================================
  # Job 5: Validate Ansible
  # ===========================================================================
  validate-ansible:
    name: Validate Ansible
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible ansible-lint

      - name: Lint Ansible Playbooks
        run: ansible-lint deploy/ansible/ || true

      - name: Syntax Check
        run: ansible-playbook deploy/ansible/playbook-ipc-setup.yml --syntax-check -i deploy/ansible/inventory.yml

  # ===========================================================================
  # Job 6: Integration Test (Plant Simulation Scenarios)
  # ===========================================================================
  integration-test:
    name: Integration Test (Simulation Scenarios)
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install simulation dependencies
        run: |
          pip install pyyaml numpy
          pip install -r tests/python/requirements-test.txt

      - name: Run all simulation scenarios
        run: python simulation/run_all_scenarios.py

      - name: Upload scenario results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-results
          path: simulation/reports/scenario_results.json
          retention-days: 30

      - name: Check for critical failures
        if: always()
        run: |
          RESULTS_FILE="simulation/reports/scenario_results.json"
          if [ ! -f "$RESULTS_FILE" ]; then
            echo "ERROR: scenario_results.json not found — scenarios did not complete"
            exit 1
          fi

          # Parse results and check for failures
          ALL_PASSED=$(python -c "
          import json, sys
          with open('$RESULTS_FILE') as f:
              data = json.load(f)
          print(data.get('all_passed', False))
          failed = data.get('failed', 0)
          total = data.get('total_scenarios', 0)
          passed = data.get('passed', 0)
          print(f'Results: {passed}/{total} passed, {failed} failed', file=sys.stderr)
          if not data.get('all_passed', False):
              # Print failed scenarios
              for s in data.get('scenarios', []):
                  if not s.get('passed'):
                      print(f\"  FAILED: {s['name']} — {s.get('error', 'check failures')}\", file=sys.stderr)
              sys.exit(1)
          ")
          echo "All simulation scenarios passed."
