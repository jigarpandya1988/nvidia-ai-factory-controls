# =============================================================================
# Telegraf Configuration — NVIDIA AI Factory Controls
# Collects MQTT data and writes to InfluxDB
# =============================================================================

[global_tags]
  site = "us-west-01"
  system = "ai-factory-controls"

[agent]
  interval = "1s"
  round_interval = true
  flush_interval = "5s"
  flush_jitter = "1s"

# =============================================================================
# INPUTS: MQTT Consumer (Sparkplug B topics)
# =============================================================================
[[inputs.mqtt_consumer]]
  servers = ["tcp://mqtt-broker:1883"]
  topics = [
    "aifactory/+/cooling/#",
    "aifactory/+/power/#",
    "aifactory/+/environment/#",
    "aifactory/+/safety/#",
    "aifactory/+/gpu/#"
  ]
  qos = 0
  data_format = "json"
  topic_tag = "topic"
  json_time_key = "timestamp"
  json_time_format = "unix_ms"

# Sparkplug B metrics (if using Sparkplug encoding)
[[inputs.mqtt_consumer]]
  name_override = "sparkplug"
  servers = ["tcp://mqtt-broker:1883"]
  topics = ["spBv1.0/AIFactory/+/DDATA/#"]
  qos = 1
  data_format = "json"

# =============================================================================
# INPUTS: System metrics from edge gateway itself
# =============================================================================
[[inputs.cpu]]
  percpu = false
  totalcpu = true

[[inputs.mem]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs"]

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_names = []

# =============================================================================
# OUTPUTS: InfluxDB v2
# =============================================================================
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "aifactory"
  bucket = "telemetry"

  [outputs.influxdb_v2.tagpass]
    # Only write process data to telemetry bucket

# Separate bucket for system metrics
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "aifactory"
  bucket = "system_metrics"
  namepass = ["cpu", "mem", "disk", "docker"]
