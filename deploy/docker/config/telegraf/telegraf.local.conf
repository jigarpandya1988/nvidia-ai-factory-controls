# =============================================================================
# Telegraf Configuration — Local Stack (NATS → InfluxDB)
# =============================================================================
# Subscribes to NATS telemetry subjects and writes to local InfluxDB.
# Used by docker-compose.local.yml for the full local simulation stack.
# =============================================================================

[global_tags]
  site = "us-west-01"
  system = "ai-factory-controls"
  env = "local"

[agent]
  interval = "1s"
  round_interval = true
  flush_interval = "5s"
  flush_jitter = "1s"

# =============================================================================
# INPUTS: NATS Consumer (subscribes to plant simulator telemetry)
# =============================================================================
[[inputs.nats_consumer]]
  servers = ["${NATS_URL}"]
  subjects = [
    "aifactory.*.sim.telemetry.>",
    "aifactory.*.*.telemetry.>",
    "aifactory.*.*.alarms.>"
  ]
  queue_group = "telegraf"
  data_format = "json"
  tag_keys = ["site_id", "cdu_id", "rack_id"]

  [inputs.nats_consumer.tags]
    source = "nats"

# =============================================================================
# INPUTS: System metrics from the telegraf container itself
# =============================================================================
[[inputs.cpu]]
  percpu = false
  totalcpu = true

[[inputs.mem]]

# =============================================================================
# OUTPUTS: InfluxDB v2
# =============================================================================
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "aifactory"
  bucket = "telemetry"

  # Exclude system metrics from telemetry bucket
  namedrop = ["cpu", "mem"]

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "aifactory"
  bucket = "system_metrics"
  namepass = ["cpu", "mem"]
