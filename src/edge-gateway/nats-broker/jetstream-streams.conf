# =============================================================================
# JetStream Stream Definitions — NVIDIA AI Factory Controls
# =============================================================================
# JetStream provides:
#   1. PERSISTENCE — Messages survive broker restart
#   2. STORE-AND-FORWARD — Buffer when cloud is disconnected
#   3. REPLAY — Re-read historical messages (mini time-series DB)
#   4. EXACTLY-ONCE — Deduplication for reliable delivery
#   5. CONSUMER GROUPS — Multiple consumers, each gets every message
#
# Create streams via: nats stream add --config <file>
# Or programmatically via NATS client library at startup.
# =============================================================================

# ─── Stream: Telemetry (all process data) ─────────────────────────────────
# Subjects: aifactory.*.*.telemetry.>
# Retention: 24 hours on edge (synced to cloud via leaf node)
# Storage: File (survives restart)
#
# nats stream add TELEMETRY \
#   --subjects "aifactory.*.*.telemetry.>" \
#   --retention limits \
#   --max-age 24h \
#   --max-bytes 5GB \
#   --storage file \
#   --replicas 1 \
#   --discard old \
#   --dupe-window 2m

# ─── Stream: Alarms (all alarm events) ───────────────────────────────────
# Subjects: aifactory.*.*.alarms.>
# Retention: 7 days on edge (full history in cloud)
# Storage: File
# Consumer: at-least-once delivery (alarms must not be lost)
#
# nats stream add ALARMS \
#   --subjects "aifactory.*.*.alarms.>" \
#   --retention limits \
#   --max-age 7d \
#   --storage file \
#   --replicas 1 \
#   --discard old

# ─── Stream: Commands (cloud → IPC) ──────────────────────────────────────
# Subjects: aifactory.*.*.commands.>
# Retention: Until acknowledged by IPC
# Storage: File (commands must not be lost)
# Work Queue: Each command consumed by exactly one IPC
#
# nats stream add COMMANDS \
#   --subjects "aifactory.*.*.commands.>" \
#   --retention work-queue \
#   --max-age 1h \
#   --storage file \
#   --replicas 1

# ─── Stream: Config (parameter/setpoint changes) ─────────────────────────
# Subjects: aifactory.*.*.config.>
# Retention: Keep last value per subject (KV-like behavior)
# This acts as a distributed configuration store.
#
# nats stream add CONFIG \
#   --subjects "aifactory.*.*.config.>" \
#   --retention limits \
#   --max-msgs-per-subject 1 \
#   --storage file \
#   --replicas 1

# ─── Stream: Status (IPC health heartbeats) ──────────────────────────────
# Subjects: aifactory.*.*.status
# Retention: Last value only (current state matters, not history)
#
# nats stream add STATUS \
#   --subjects "aifactory.*.*.status" \
#   --retention limits \
#   --max-msgs-per-subject 1 \
#   --storage memory \
#   --replicas 1
