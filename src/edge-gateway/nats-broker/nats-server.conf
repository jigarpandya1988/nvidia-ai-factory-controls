# =============================================================================
# NATS Server Configuration — NVIDIA AI Factory Edge Gateway
# =============================================================================
# Primary message broker for inter-IPC, edge, and cloud communication.
# Replaces EMQX/Mosquitto with lower latency and built-in persistence.
#
# Architecture:
#   IPC CODESYS → NATS client lib → Edge NATS (this) → Leaf Node → Cloud NATS
#
# Deploy: docker run -v ./nats-server.conf:/etc/nats/nats-server.conf nats:latest
# =============================================================================

# ─── Server Identity ──────────────────────────────────────────────────────
server_name: "aifactory-edge-us-west-01"
listen: 0.0.0.0:4222

# ─── Cluster (for edge HA — 2 edge servers in active/standby) ────────────
# cluster {
#   name: "aifactory-edge-cluster"
#   listen: 0.0.0.0:6222
#   routes: [
#     "nats-route://edge-gw-02:6222"
#   ]
# }

# ─── Leaf Node (connects edge to cloud NATS) ─────────────────────────────
# This is how edge data flows to cloud WITHOUT a separate bridge service.
# The leaf node transparently extends the cloud NATS subject space.
leafnodes {
  remotes [
    {
      url: "tls://connect.ngs.global:7422"  # NATS cloud (Synadia NGS or self-hosted)
      # For self-hosted cloud NATS:
      # url: "tls://nats.cloud.aifactory.internal:7422"
      credentials: "/etc/nats/creds/edge-gateway.creds"
      
      # Only forward these subjects to cloud (bandwidth control)
      # Everything else stays local on the edge
      account: "AIFACTORY"
    }
  ]
}

# ─── JetStream (built-in persistence + store-and-forward) ────────────────
jetstream {
  store_dir: "/data/jetstream"
  max_mem: 256MB       # In-memory buffer for hot data
  max_file: 10GB       # Disk storage for offline buffering
}

# ─── Authorization (subject-based permissions) ────────────────────────────
authorization {
  # IPC clients can publish telemetry and subscribe to commands
  IPC_PERMS = {
    publish: [
      "aifactory.*.*.telemetry.>"    # Publish own telemetry
      "aifactory.*.*.alarms.>"       # Publish alarms
      "aifactory.*.*.status"         # Publish health status
      "aifactory.*.*.peer"           # Publish peer exchange data
      "_INBOX.>"                     # Request/reply inbox
    ]
    subscribe: [
      "aifactory.*.*.commands.>"     # Receive commands
      "aifactory.*.*.config.>"       # Receive config updates
      "aifactory.*.*.peer"           # Receive peer exchange data
      "_INBOX.>"                     # Request/reply inbox
    ]
  }
  
  # Cloud/SCADA can subscribe to everything, publish commands only
  CLOUD_PERMS = {
    publish: [
      "aifactory.*.*.commands.>"     # Send commands to IPCs
      "aifactory.*.*.config.>"       # Push config changes
      "_INBOX.>"
    ]
    subscribe: [
      "aifactory.>"                  # Subscribe to all telemetry
      "_INBOX.>"
    ]
  }

  users: [
    { user: "ipc-power",       password: "$NATS_IPC_POWER_PW",       permissions: $IPC_PERMS }
    { user: "ipc-cooling",     password: "$NATS_IPC_COOLING_PW",     permissions: $IPC_PERMS }
    { user: "ipc-environment", password: "$NATS_IPC_ENVIRONMENT_PW", permissions: $IPC_PERMS }
    { user: "ipc-safety",      password: "$NATS_IPC_SAFETY_PW",      permissions: $IPC_PERMS }
    { user: "cloud-bridge",    password: "$NATS_CLOUD_PW",           permissions: $CLOUD_PERMS }
    { user: "grafana",         password: "$NATS_GRAFANA_PW",         permissions: $CLOUD_PERMS }
  ]
}

# ─── TLS (encrypted connections) ─────────────────────────────────────────
# NOTE: TLS is disabled for local development/simulation.
# For production: uncomment and provide proper certificates.
# tls {
#   cert_file: "/etc/nats/certs/server.crt"
#   key_file: "/etc/nats/certs/server.key"
#   ca_file: "/etc/nats/certs/ca.crt"
#   verify: true          # Require client certificates
#   timeout: 5
# }

# ─── Monitoring ───────────────────────────────────────────────────────────
http_port: 8222         # Health + metrics endpoint (Prometheus compatible)

# ─── Limits ───────────────────────────────────────────────────────────────
max_connections: 100
max_payload: 1MB        # Max message size (ST_PeerData is 128 bytes)
max_pending: 64MB       # Buffer per slow consumer before disconnect

# ─── Logging ─────────────────────────────────────────────────────────────
debug: false
trace: false
logtime: true
log_file: "/var/log/nats/nats-server.log"
